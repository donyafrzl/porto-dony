name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Staging Server)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            mkdir -p /app/portfolio-vue-staging
            cd /app/portfolio-vue-staging

            # Ambil kode branch staging
            if [ ! -d ".git" ]; then
              git clone -b staging https://github.com/donyafrzl/porto-dony.git .
            else
              git fetch --all
              git reset --hard origin/staging
            fi

            # Build & Run menggunakan Docker CLI
            docker build -t vue-portfolio:staging .
            docker stop vue-app-staging || true
            docker rm vue-app-staging || true
            docker run -d --name vue-app-staging -p 8081:80 vue-portfolio:staging