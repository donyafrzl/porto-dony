name: Deploy to Development

on:
  push:
    branches:
      - development

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Dev Server)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            mkdir -p /home/devopsdony/portfolio-vue-dev
            cd /home/devopsdony/portfolio-vue-dev

            # Ambil kode branch development
            if [ ! -d ".git" ]; then
              git clone -b development https://github.com/donyafrzl/porto-dony.git .
            else
              git fetch --all
              git reset --hard origin/development
            fi

            # Build & Run menggunakan Docker CLI
            docker build -t vue-portfolio:development .
            docker stop vue-app-development || true
            docker rm vue-app-development || true
            docker image prune -f
            docker run -d --name vue-app-development -p 127.0.0.1:8080:80 --restart always vue-portfolio:development