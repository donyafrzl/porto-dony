name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Production Server)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # 1. Pindahkan folder ke home directory milik devopsdony
            mkdir -p /home/devopsdony/portfolio-vue-prod
            cd /home/devopsdony/portfolio-vue-prod

            # 2. Ambil kode branch main secara bersih
            if [ ! -d ".git" ]; then
              git clone -b main https://github.com/donyafrzl/porto-dony.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi

            # Build menggunakan Docker CLI
            docker build -t vue-portfolio:production .

            # Hentikan & hapus container lama jika ada
            docker stop vue-app-production || true
            docker rm vue-app-production || true

            # Hapus image lama yang menumpuk agar memori VPS tidak penuh
            docker image prune -f

            # Jalankan container baru di port 8000 (Localhost Only)
            docker run -d \
            --name vue-app-production \
            -p 127.0.0.1:8000:80 \
            --restart always \
            vue-portfolio:production