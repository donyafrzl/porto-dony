name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Production Server)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            mkdir -p /app/portfolio-vue-prod
            cd /app/portfolio-vue-prod

            # Ambil kode branch main
            if [ ! -d ".git" ]; then
              git clone -b main https://github.com/donyafrzl/porto-dony.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi

            # Build & Run menggunakan Docker CLI
            docker build -t vue-portfolio:production .
            docker stop vue-app-production || true
            docker rm vue-app-production || true
            docker run -d --name vue-app-production -p 80:80 vue-portfolio:production